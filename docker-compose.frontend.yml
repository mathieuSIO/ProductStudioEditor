services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: mpm_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - mpm_network

networks:
  mpm_network:
    external: true